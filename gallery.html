<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080c1a" />
    <title>Galaxy Explorer · флот и станции</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <style>
      /* cartographer fonts (offline) — same vendored woff2 as the main app */
      @font-face { font-family: 'EB Garamond'; font-style: normal; font-weight: 400; font-display: swap;
        src: url('./vendor/fonts/eb-garamond-latin-400-normal.woff2') format('woff2'); }
      @font-face { font-family: 'EB Garamond'; font-style: normal; font-weight: 400; font-display: swap;
        src: url('./vendor/fonts/eb-garamond-cyrillic-400-normal.woff2') format('woff2');
        unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116; }
      @font-face { font-family: 'EB Garamond'; font-style: normal; font-weight: 500; font-display: swap;
        src: url('./vendor/fonts/eb-garamond-latin-500-normal.woff2') format('woff2'); }
      @font-face { font-family: 'EB Garamond'; font-style: normal; font-weight: 500; font-display: swap;
        src: url('./vendor/fonts/eb-garamond-cyrillic-500-normal.woff2') format('woff2');
        unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116; }
      @font-face { font-family: 'EB Garamond'; font-style: italic; font-weight: 400; font-display: swap;
        src: url('./vendor/fonts/eb-garamond-latin-400-italic.woff2') format('woff2'); }
      @font-face { font-family: 'EB Garamond'; font-style: italic; font-weight: 400; font-display: swap;
        src: url('./vendor/fonts/eb-garamond-cyrillic-400-italic.woff2') format('woff2');
        unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116; }
      @font-face { font-family: 'IBM Plex Mono'; font-style: normal; font-weight: 400; font-display: swap;
        src: url('./vendor/fonts/ibm-plex-mono-latin-400-normal.woff2') format('woff2'); }
      @font-face { font-family: 'IBM Plex Mono'; font-style: normal; font-weight: 400; font-display: swap;
        src: url('./vendor/fonts/ibm-plex-mono-cyrillic-400-normal.woff2') format('woff2');
        unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116; }
      :root {
        --ink-void: #080c1a; --vellum: rgba(222, 213, 186, 0.5); --vellum-soft: rgba(222, 213, 186, 0.2);
        --vellum-strong: rgba(228, 219, 192, 0.8); --ivory: #f1ead6; --ivory-dim: #cdbf9d; --parchment: #a89a78;
        --brass: #cda24e; --brass-bright: #e7c074;
        --font-serif: 'EB Garamond', Georgia, serif; --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--ink-void);
        overflow: hidden;
        font-family: var(--font-serif);
        color: var(--ivory);
        -webkit-font-smoothing: antialiased;
      }
      canvas {
        display: block;
      }
      #title {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.01em;
        color: var(--ivory);
        text-wrap: balance;
      }
      #back {
        position: fixed;
        top: 14px;
        left: 18px;
        z-index: 10;
        color: var(--ivory-dim);
        text-decoration: none;
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        border: 1px solid var(--vellum);
        padding: 9px 14px;
        border-radius: 2px;
        background: linear-gradient(180deg, rgba(11, 14, 30, 0.7), rgba(8, 10, 22, 0.7));
        backdrop-filter: blur(8px);
        transition: background 0.2s, border-color 0.2s, transform 0.2s;
      }
      #back:hover {
        border-color: var(--vellum-strong);
      }
      #back:active {
        transform: scale(0.96);
      }
      #factions {
        position: fixed;
        top: 52px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 92vw;
      }
      #factions button {
        border: 1px solid var(--vellum-soft);
        background: linear-gradient(180deg, rgba(11, 14, 30, 0.6), rgba(8, 10, 22, 0.6));
        color: var(--ivory-dim);
        font-family: var(--font-mono);
        font-size: 10.5px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 7px 14px;
        border-radius: 2px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }
      #factions button:hover {
        border-color: var(--vellum);
        color: var(--ivory);
      }
      #factions button.on {
        border-color: var(--brass);
        background: linear-gradient(180deg, rgba(22, 18, 10, 0.72), rgba(14, 12, 8, 0.72));
        color: var(--brass-bright);
      }
      #lore {
        position: fixed;
        top: 94px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-style: italic;
        font-size: 15px;
        color: var(--ivory-dim);
        max-width: 80vw;
        text-align: center;
        text-wrap: pretty;
      }
      #hint {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--parchment);
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.js",
          "three/addons/": "./vendor/addons/"
        }
      }
    </script>
  </head>
  <body>
    <a id="back" href="./index.html">← к галактике</a>
    <div id="title">Флот и станции</div>
    <div id="factions"></div>
    <div id="lore"></div>
    <div id="hint">ЛКМ — повернуть · колесо — зум · кнопки сверху — фракция</div>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { ROLES, FACTIONS, buildShip } from './src/systems/ships.js';
      import { STATION_TYPES, createStation } from './src/systems/stations.js';

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color('#080c1a');
      {
        const n = 600;
        const pos = new Float32Array(n * 3);
        for (let i = 0; i < n; i++) {
          pos[i * 3] = (Math.random() - 0.5) * 60;
          pos[i * 3 + 1] = (Math.random() - 0.5) * 40;
          pos[i * 3 + 2] = -10 - Math.random() * 30;
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.06, color: 0x8893c0 })));
      }

      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 16);
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;

      function labelSprite(text, sub) {
        const cv = document.createElement('canvas');
        cv.width = 512;
        cv.height = 80;
        const ctx = cv.getContext('2d');
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // cartographer baked labels (#12): serif name + mono caption, ivory on
        // parchment — same palette as the main app's diegetic labels.
        let fs = 34;
        ctx.font = `500 ${fs}px 'EB Garamond', Georgia, serif`;
        while (ctx.measureText(text).width > cv.width - 24 && fs > 18) {
          fs -= 2;
          ctx.font = `500 ${fs}px 'EB Garamond', Georgia, serif`;
        }
        ctx.fillStyle = '#f1ead6'; // --ivory
        ctx.fillText(text, cv.width / 2, 27);
        if (sub) {
          if ('letterSpacing' in ctx) ctx.letterSpacing = '0.5px';
          ctx.font = `400 17px 'IBM Plex Mono', ui-monospace, monospace`;
          ctx.fillStyle = '#a89a78'; // --parchment
          ctx.fillText(sub, cv.width / 2, 58);
          if ('letterSpacing' in ctx) ctx.letterSpacing = '0px';
        }
        const tex = new THREE.CanvasTexture(cv);
        tex.colorSpace = THREE.SRGBColorSpace;
        const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false, depthTest: false }));
        spr.scale.set(3.6, 0.56, 1);
        spr.userData.tex = tex;
        return spr;
      }

      const COLS = 3;
      const DX = 3.6;
      const DY = 3.0;
      let spinners = [];
      let added = []; // everything we add per faction (to clear on switch)

      function disposeObj(o) {
        o.traverse((c) => {
          if (c.geometry) c.geometry.dispose();
          if (c.material) {
            if (c.material.map) c.material.map.dispose();
            c.material.dispose();
          }
        });
      }

      function place(group, col, row, rows, name, sub) {
        const box = new THREE.Box3().setFromObject(group);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);
        const maxd = Math.max(size.x, size.y, size.z) || 1;
        group.position.sub(center);
        const scaler = new THREE.Group();
        scaler.add(group);
        scaler.scale.setScalar(1.5 / maxd);
        const spinner = new THREE.Group();
        spinner.rotation.x = 0.35;
        spinner.add(scaler);
        const gx = (col - (COLS - 1) / 2) * DX;
        const gy = ((rows - 1) / 2 - row) * DY;
        spinner.position.set(gx, gy + 0.2, 0);
        scene.add(spinner);
        spinners.push(spinner);
        added.push(spinner);
        const lab = labelSprite(name, sub);
        lab.position.set(gx, gy - 1.15, 0);
        scene.add(lab);
        added.push(lab);
      }

      function build(faction) {
        for (const o of added) {
          scene.remove(o);
          disposeObj(o);
        }
        spinners = [];
        added = [];
        document.getElementById('title').textContent = `Флот «${faction.name}» — 9 ролей + станции`;
        document.getElementById('lore').textContent = faction.lore || '';
        const shipRows = Math.ceil(ROLES.length / COLS);
        const totalRows = shipRows + 1;
        ROLES.forEach((r, i) => {
          place(buildShip(r.id, faction.id), i % COLS, Math.floor(i / COLS), totalRows, r.name, `${r.size} · ${r.purpose}`);
        });
        STATION_TYPES.forEach((t, i) => {
          place(createStation(t.id, 1, faction), i % COLS, shipRows, totalRows, t.name, 'станция');
        });
      }

      // faction selector buttons
      const bar = document.getElementById('factions');
      const buttons = FACTIONS.map((f) => {
        const b = document.createElement('button');
        b.textContent = f.name;
        b.addEventListener('click', () => {
          build(f);
          buttons.forEach((x) => x.classList.toggle('on', x === b));
        });
        bar.appendChild(b);
        return b;
      });
      buttons[0].classList.add('on');
      // bake labels only after the cartographer fonts are rasterised, else the
      // first faction's name textures fall back to a generic sans-serif (#12).
      Promise.all([
        document.fonts.load("500 34px 'EB Garamond'"),
        document.fonts.load("400 17px 'IBM Plex Mono'"),
      ])
        .catch(() => {})
        .then(() => build(FACTIONS[0]));

      let last = performance.now();
      function loop(now) {
        const dt = Math.min((now - last) / 1000, 0.05);
        last = now;
        for (const s of spinners) s.rotation.y += dt * 0.5;
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>

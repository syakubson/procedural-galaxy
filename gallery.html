<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galaxy — флот и станции</title>
    <style>
      body {
        margin: 0;
        background: #05060d;
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
        color: #cdd2ff;
      }
      canvas {
        display: block;
      }
      #title {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-size: 15px;
        letter-spacing: 0.04em;
        opacity: 0.9;
      }
      #back {
        position: fixed;
        top: 12px;
        left: 16px;
        z-index: 10;
        color: #9fb0ff;
        text-decoration: none;
        font-size: 13px;
        border: 1px solid rgba(150, 160, 230, 0.25);
        padding: 6px 12px;
        border-radius: 10px;
        background: rgba(10, 11, 24, 0.5);
      }
      #back:hover {
        background: rgba(30, 32, 60, 0.7);
      }
      #factions {
        position: fixed;
        top: 44px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 92vw;
      }
      #factions button {
        border: 1px solid rgba(150, 160, 230, 0.22);
        background: rgba(10, 11, 24, 0.55);
        color: #cdd2ff;
        font-size: 13px;
        padding: 6px 14px;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      #factions button:hover {
        background: rgba(30, 32, 60, 0.7);
      }
      #factions button.on {
        border-color: rgba(125, 200, 255, 0.6);
        background: rgba(40, 60, 110, 0.7);
        color: #fff;
      }
      #lore {
        position: fixed;
        top: 84px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-size: 12px;
        opacity: 0.6;
        max-width: 80vw;
        text-align: center;
      }
      #hint {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-size: 12px;
        opacity: 0.5;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.js",
          "three/addons/": "./vendor/addons/"
        }
      }
    </script>
  </head>
  <body>
    <a id="back" href="./index.html">← к галактике</a>
    <div id="title">Флот и станции</div>
    <div id="factions"></div>
    <div id="lore"></div>
    <div id="hint">ЛКМ — повернуть · колесо — зум · кнопки сверху — фракция</div>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { ROLES, FACTIONS, buildShip } from './src/systems/ships.js';
      import { STATION_TYPES, createStation } from './src/systems/stations.js';

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color('#05060d');
      {
        const n = 600;
        const pos = new Float32Array(n * 3);
        for (let i = 0; i < n; i++) {
          pos[i * 3] = (Math.random() - 0.5) * 60;
          pos[i * 3 + 1] = (Math.random() - 0.5) * 40;
          pos[i * 3 + 2] = -10 - Math.random() * 30;
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.06, color: 0x8893c0 })));
      }

      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 16);
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;

      function labelSprite(text, sub) {
        const cv = document.createElement('canvas');
        cv.width = 512;
        cv.height = 80;
        const ctx = cv.getContext('2d');
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        let fs = 30;
        ctx.font = `600 ${fs}px system-ui, sans-serif`;
        while (ctx.measureText(text).width > cv.width - 24 && fs > 16) {
          fs -= 2;
          ctx.font = `600 ${fs}px system-ui, sans-serif`;
        }
        ctx.fillStyle = '#dfe4ff';
        ctx.fillText(text, cv.width / 2, 30);
        if (sub) {
          ctx.font = '400 20px system-ui, sans-serif';
          ctx.fillStyle = '#8893c0';
          ctx.fillText(sub, cv.width / 2, 58);
        }
        const tex = new THREE.CanvasTexture(cv);
        tex.colorSpace = THREE.SRGBColorSpace;
        const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false, depthTest: false }));
        spr.scale.set(3.6, 0.56, 1);
        spr.userData.tex = tex;
        return spr;
      }

      const COLS = 3;
      const DX = 3.6;
      const DY = 3.0;
      let spinners = [];
      let added = []; // everything we add per faction (to clear on switch)

      function disposeObj(o) {
        o.traverse((c) => {
          if (c.geometry) c.geometry.dispose();
          if (c.material) {
            if (c.material.map) c.material.map.dispose();
            c.material.dispose();
          }
        });
      }

      function place(group, col, row, rows, name, sub) {
        const box = new THREE.Box3().setFromObject(group);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);
        const maxd = Math.max(size.x, size.y, size.z) || 1;
        group.position.sub(center);
        const scaler = new THREE.Group();
        scaler.add(group);
        scaler.scale.setScalar(1.5 / maxd);
        const spinner = new THREE.Group();
        spinner.rotation.x = 0.35;
        spinner.add(scaler);
        const gx = (col - (COLS - 1) / 2) * DX;
        const gy = ((rows - 1) / 2 - row) * DY;
        spinner.position.set(gx, gy + 0.2, 0);
        scene.add(spinner);
        spinners.push(spinner);
        added.push(spinner);
        const lab = labelSprite(name, sub);
        lab.position.set(gx, gy - 1.15, 0);
        scene.add(lab);
        added.push(lab);
      }

      function build(faction) {
        for (const o of added) {
          scene.remove(o);
          disposeObj(o);
        }
        spinners = [];
        added = [];
        document.getElementById('title').textContent = `Флот «${faction.name}» — 9 ролей + станции`;
        document.getElementById('lore').textContent = faction.lore || '';
        const shipRows = Math.ceil(ROLES.length / COLS);
        const totalRows = shipRows + 1;
        ROLES.forEach((r, i) => {
          place(buildShip(r.id, faction.id), i % COLS, Math.floor(i / COLS), totalRows, r.name, `${r.size} · ${r.purpose}`);
        });
        STATION_TYPES.forEach((t, i) => {
          place(createStation(t.id, 1, faction), i % COLS, shipRows, totalRows, t.name, 'станция');
        });
      }

      // faction selector buttons
      const bar = document.getElementById('factions');
      const buttons = FACTIONS.map((f) => {
        const b = document.createElement('button');
        b.textContent = f.name;
        b.addEventListener('click', () => {
          build(f);
          buttons.forEach((x) => x.classList.toggle('on', x === b));
        });
        bar.appendChild(b);
        return b;
      });
      buttons[0].classList.add('on');
      build(FACTIONS[0]);

      let last = performance.now();
      function loop(now) {
        const dt = Math.min((now - last) / 1000, 0.05);
        last = now;
        for (const s of spinners) s.rotation.y += dt * 0.5;
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>

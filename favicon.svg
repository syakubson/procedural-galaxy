<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="68%">
      <stop offset="0%" stop-color="#16203f"/>
      <stop offset="62%" stop-color="#0b1024"/>
      <stop offset="100%" stop-color="#070a16"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6e0"/>
      <stop offset="55%" stop-color="#e7c074"/>
      <stop offset="100%" stop-color="#cda24e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- ink-void plate -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- cartographer survey reticle, in brass -->
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#cda24e" stroke-opacity="0.34" stroke-width="1"/>
  <circle cx="16" cy="16" r="7.4" fill="none" stroke="#cda24e" stroke-width="1.9"/>
  <g stroke="#e7c074" stroke-width="1.4" stroke-linecap="round">
    <line x1="16" y1="3.6" x2="16" y2="6.6"/>
    <line x1="16" y1="25.4" x2="16" y2="28.4"/>
    <line x1="3.6" y1="16" x2="6.6" y2="16"/>
    <line x1="25.4" y1="16" x2="28.4" y2="16"/>
  </g>
  <!-- glowing plotted star at the centre -->
  <circle cx="16" cy="16" r="4.6" fill="url(#core)"/>
  <circle cx="16" cy="16" r="1.7" fill="#fff6e0"/>
</svg>

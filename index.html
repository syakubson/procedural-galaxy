<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#080c1a" />
    <title>Galaxy Explorer</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />

    <!-- Resolve bare module specifiers to the vendored Three.js + lil-gui. -->
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.js",
          "three/addons/": "./vendor/addons/",
          "lil-gui": "./vendor/lil-gui.esm.js"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="scene"></canvas>

    <div id="loader" aria-hidden="true">
      <div class="loader__core"></div>
      <span>Составление звёздной описи…</span>
    </div>

    <div id="hint">
      <span><b>Колесо мыши</b> — приблизиться к курсору</span>
      <span class="hint__dot">·</span>
      <span><b>Зажать ЛКМ</b> — повернуть галактику</span>
      <span class="hint__dot">·</span>
      <span><b>Стрелки / WASD</b> — обзор, <b>Q/E</b> — зум</span>
      <span class="hint__dot">·</span>
      <span><b>Сверху справа</b> — настройки</span>
    </div>

    <button id="settings-toggle" title="Настройки галактики" aria-label="Настройки"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.1"/><path d="M12 2.5v2.4M12 19.1v2.4M21.5 12h-2.4M4.9 12H2.5M18.7 5.3l-1.7 1.7M7 17l-1.7 1.7M18.7 18.7L17 17M7 7L5.3 5.3"/></svg></button>

    <button id="codex-toggle" title="Кодекс — коллекция находок" aria-label="Кодекс"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.2c-1.6-1.1-3.6-1.6-5.6-1.4-.7.1-1.2.7-1.2 1.4v11c0 .9.8 1.5 1.6 1.4 1.8-.2 3.7.2 5.2 1.3 1.5-1.1 3.4-1.5 5.2-1.3.9.1 1.6-.5 1.6-1.4v-11c0-.7-.5-1.3-1.2-1.4-2-.2-4 .3-5.6 1.4Z"/><path d="M12 6.2v13.7"/></svg><span class="codex-tab-label">Кодекс</span></button>

    <button id="view-mode" title="Режим отображения: подписи / сцена / кино" aria-label="Режим отображения">❏</button>

    <!-- ranging reticle — brass corner brackets that lock onto the focused object -->
    <div id="reticle" aria-hidden="true">
      <span class="rt c1"></span><span class="rt c2"></span><span class="rt c3"></span><span class="rt c4"></span>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
